services:
  - type: web
    name: barakat-helpdesk
    env: docker
    plan: starter
    autoDeploy: true
    healthCheckPath: /api/health
    disk:
      name: barakat-helpdesk-storage
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: STORAGE_DIR
        value: /var/data
      - key: COOKIE_SECURE
        value: "true"
