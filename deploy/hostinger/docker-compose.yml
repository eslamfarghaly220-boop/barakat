services:
  barakat-helpdesk:
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: barakat-helpdesk
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      STORAGE_DIR: /var/data
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
    ports:
      - "${BARAKAT_BIND:-0.0.0.0}:${BARAKAT_PORT:-3000}:3000"
    volumes:
      - barakat_storage:/var/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/health').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  barakat_storage:
